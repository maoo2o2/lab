<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e6edf3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #21262d;
      background: #161b22;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #30363d; }
    button.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .pane + .pane {
      border-left: 1px solid #21262d;
    }

    #input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #c9d1d9;
      caret-color: #58a6ff;
    }

    #input::placeholder { color: #484f58; }

    /* Markdown styles */
    #preview { line-height: 1.7; font-size: 15px; }

    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      line-height: 1.25;
      color: #e6edf3;
    }
    #preview h1 { font-size: 2em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
    #preview h3 { font-size: 1.25em; }

    #preview p { margin-bottom: 1em; color: #c9d1d9; }

    #preview a { color: #58a6ff; text-decoration: none; }
    #preview a:hover { text-decoration: underline; }

    #preview code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.875em;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.2em 0.4em;
      color: #ff7b72;
    }

    #preview pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1em;
    }

    #preview pre code {
      background: none;
      border: none;
      padding: 0;
      color: #c9d1d9;
      font-size: 13px;
    }

    #preview blockquote {
      border-left: 3px solid #30363d;
      padding-left: 16px;
      margin: 0 0 1em;
      color: #8b949e;
    }

    #preview ul, #preview ol {
      padding-left: 2em;
      margin-bottom: 1em;
      color: #c9d1d9;
    }

    #preview li { margin-bottom: 0.25em; }

    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
      font-size: 14px;
    }

    #preview th, #preview td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }

    #preview th { background: #161b22; font-weight: 600; }
    #preview tr:nth-child(even) td { background: #0d1117; }

    #preview hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 1.5em 0;
    }

    #preview img { max-width: 100%; border-radius: 6px; }

    .placeholder-msg {
      color: #484f58;
      font-size: 14px;
      margin-top: 20px;
    }

    /* Single pane mode */
    .workspace.preview-only #input-pane { display: none; }
    .workspace.preview-only #preview-pane { border-left: none; }
    .workspace.edit-only #preview-pane { display: none; }

    /* Copy toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f6feb;
      color: #fff;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>MD VIEWER</h1>
  <div class="controls">
    <button id="btn-split" class="active" onclick="setMode('split')">Split</button>
    <button id="btn-edit" onclick="setMode('edit')">Edit</button>
    <button id="btn-preview" onclick="setMode('preview')">Preview</button>
    <button onclick="copyHtml()">HTML コピー</button>
    <button onclick="clearAll()">クリア</button>
  </div>
</header>

<div class="workspace" id="workspace">
  <div class="pane" id="input-pane">
    <textarea id="input" placeholder="ここに Markdown を貼り付け…" spellcheck="false"></textarea>
  </div>
  <div class="pane" id="preview-pane">
    <div id="preview">
      <p class="placeholder-msg">← Markdown を貼り付けるとここにレンダリングされます</p>
    </div>
  </div>
</div>

<div id="toast">コピーしました</div>

<script>
  const input = document.getElementById('input');
  const preview = document.getElementById('preview');
  const workspace = document.getElementById('workspace');

  marked.setOptions({ breaks: true, gfm: true });

  function render() {
    const md = input.value.trim();
    if (!md) {
      preview.innerHTML = '<p class="placeholder-msg">← Markdown を貼り付けるとここにレンダリングされます</p>';
      return;
    }
    preview.innerHTML = marked.parse(md);
  }

  input.addEventListener('input', render);

  function setMode(mode) {
    workspace.className = 'workspace ' + (mode === 'split' ? '' : mode + '-only');
    document.getElementById('btn-split').className = mode === 'split' ? 'active' : '';
    document.getElementById('btn-edit').className = mode === 'edit' ? 'active' : '';
    document.getElementById('btn-preview').className = mode === 'preview' ? 'active' : '';
  }

  function copyHtml() {
    navigator.clipboard.writeText(preview.innerHTML).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    });
  }

  function clearAll() {
    input.value = '';
    render();
  }

  // Auto-focus
  input.focus();
</script>
</body>
</html>
