<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lab — maoo2o2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e6edf3;
      min-height: 100dvh;
      padding: 60px 40px;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.1em;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      max-width: 900px;
    }
    a.card {
      display: block;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    a.card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>LAB</h1>
  <div class="grid">
    <a class="card" href="./md-viewer/">
      <div class="card-name">MD Viewer</div>
      <div class="card-desc">Markdown を貼り付けてリアルタイムレンダリング</div>
    </a>
  </div>
</body>
</html>
